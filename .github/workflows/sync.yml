name: Sync with upstream
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git remote add upstream https://github.com/openclaw/skills.git
      - run: git fetch upstream
      - id: check
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" != "$UPSTREAM" ]; then echo "update_needed=true" >> $GITHUB_OUTPUT; else echo "update_needed=false" >> $GITHUB_OUTPUT; fi          
      - if: steps.check.outputs.update_needed == 'true'
        run: |
          git merge upstream/main --no-edit
          git push origin main          
